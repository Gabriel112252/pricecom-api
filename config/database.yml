default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: postgres
  host: localhost
  port: 5433

development:
  <<: *default
  database: pricecom_development

test:
  <<: *default
  database: pricecom_test

production:
  <<: *default
  database: pricecom_production
  url: <%= ENV["DATABASE_URL"] %>