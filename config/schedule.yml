# Loaded by sidekiq-cron — see config/initializers/sidekiq.rb.
# Runs the dispatcher every 15 minutes; it fans out one ProductSyncJob per
# active ChannelCredential (see Integrations::ScheduleProductSyncsJob).
product_sync_dispatch:
  cron: "*/15 * * * *"
  class: "Integrations::ScheduleProductSyncsJob"
  queue: integrations

yampi_order_polling_dispatch:
  cron: "*/5 * * * *"
  class: "Integrations::Yampi::OrdersPollingSchedulerJob"
  queue: integrations

# Abandoned carts move slower than orders (a cart only matters after the
# customer walked away), so 15min is enough; the cart.reminder webhook
# covers real-time capture between polls.
yampi_cart_polling_dispatch:
  cron: "*/15 * * * *"
  class: "Integrations::Yampi::CartsPollingSchedulerJob"
  queue: integrations

tiktok_order_polling_dispatch:
  cron: "*/15 * * * *"
  class: "Integrations::Tiktok::OrdersPollingSchedulerJob"
  queue: integrations

# Proxy de carrinho abandonado do TikTok Shop (não existe carrinho
# pré-checkout na API): varre pedidos UNPAID e materializa em orders
# (status unpaid, fora do faturamento) + carts (mesmo gadget do Yampi).
tiktok_unpaid_orders_sync_dispatch:
  cron: "*/20 * * * *"
  class: "Integrations::Tiktok::UnpaidOrdersSyncSchedulerJob"
  queue: integrations

# Desfecho dos pedidos unpaid: converteu (PAID+), cancelou ou, após 5 dias
# sem resposta determinável, status_unknown (para de reconsultar).
tiktok_unpaid_reconciliation_dispatch:
  cron: "*/30 * * * *"
  class: "Integrations::Tiktok::UnpaidReconciliationSchedulerJob"
  queue: integrations

# idworks (ERP) has no webhooks — polling is the only option (see
# Integrations::Idworks::OrderSyncService/ProductCostSyncService class
# comments). Product cost changes infrequently, so a 6h full sync is
# enough; freight needs to reflect new orders promptly, so it polls every
# 15min with a 2h incremental window (overlap is intentional/idempotent).
idworks_product_cost_sync_dispatch:
  cron: "0 */6 * * *"
  class: "Integrations::Idworks::ScheduleProductCostSyncsJob"
  queue: integrations

idworks_order_sync_dispatch:
  cron: "*/15 * * * *"
  class: "Integrations::Idworks::ScheduleOrderSyncsJob"
  queue: integrations

# LucroFrete: custo real de frete via pedidos ja casados pelo parceiro
# (/api/reports/orders). O polling antigo de /api/logs fica disponivel
# apenas para analise de cotacoes brutas, nao para real_freight_cost.
lucrofrete_orders_sync_dispatch:
  cron: "*/15 * * * *"
  class: "Integrations::Lucrofrete::OrdersSyncSchedulerJob"
  queue: integrations

pagarme_payable_sync:
  cron: "*/30 * * * *"
  class: "Financials::PagarmePayableSyncJob"
  queue: integrations
